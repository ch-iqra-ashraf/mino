<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="../css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
        integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
        crossorigin="anonymous" referrerpolicy="no-referrer" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@300..700&display=swap" rel="stylesheet">
    <title>Mino</title>
</head>

<body>
    <header>
        <div class="navbar">
            <div class="nav-logo border">
                <div class="logo"></div>
            </div>
            <div class="nav-search">
                <div><input type="search" placeholder="     Search Products" class="search"><button>Search</button>
                </div>

            </div>
            <div class="add-icon">
                <i class="fa-solid fa-user"></i>
                <i class="fa-solid fa-heart"></i>
                <i class="fa-solid fa-cart-shopping"></i>
            </div>
        </div>
        <div class="panel">
            <div class="panel-ops">
                <div class="mobilepanel-ops">
                    <p>Home</p>
                    <p>Fashion</p>
                    <p>Gear</p>
                    <p>Feeding</p>
                    <p>Bath</p>
                    <p>Safety</p>
                    <p>Toys</p>
                    <p>Diapering</p>
                    <p>Moms</p>
                    <p>Nursery</p>
                    <p>School</p>
                    <p>Birthday</p>
                    <p>Sale</p>
                    <p>New Arrival</p>
                </div>
            </div>
    </header>

    <div class="hero-section">
        <div class="hero-img"></div>
    </div>
    <section>
        <div class="section-1">
            <div class="box">
                <div class="box-img" style="background-image: url(images/image-1.webp);"></div>
                <div class="box-img" style="background-image: url(images/image-2.webp);"></div>
                <div class="box-img" style="background-image: url(images/image-3.webp);"></div>
                <div class="box-img" style="background-image: url(images/image-4.webp);"></div>
            </div>
        </div>
    </section>
    <section>
        <h2 class="side-lines">Best Sellers</h2>
<p class="subtitle">Enjoy the all best products</p>
    </section>
</body>

</html>
